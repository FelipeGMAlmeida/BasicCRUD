name: CI/CD — Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/basiccrud-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/basiccrud-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/basiccrud-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/basiccrud-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/basiccrud/"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          REPO_OWNER: ${{ env.OWNER_LC }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR,REPO_OWNER,DB_PASSWORD,JWT_SECRET
          script: |
            set -e
            cd /opt/basiccrud

            # Write production .env
            printf '%s\n' \
              "DB_NAME=basiccrud" \
              "DB_USER=postgres" \
              "DB_PASSWORD=${DB_PASSWORD}" \
              "JWT_SECRET=${JWT_SECRET}" \
              "JWT_EXPIRATION=86400000" \
              "BACKEND_IMAGE=ghcr.io/${REPO_OWNER}/basiccrud-backend:latest" \
              "FRONTEND_IMAGE=ghcr.io/${REPO_OWNER}/basiccrud-frontend:latest" \
              > .env

            # Login to GHCR and pull latest images
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin
            docker compose -f docker-compose.prod.yml pull

            # Restart services
            docker compose -f docker-compose.prod.yml up -d

            # Remove dangling images to free disk space
            docker image prune -f

